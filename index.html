<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Laughing Man</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    font-family: 'Courier New', monospace;
    color: #00ffcc;
    overflow: hidden;
  }

  #container {
    position: relative;
    width: 100%;
    max-width: 480px;
  }

  video { display: none; }

  canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
  }

  #ui {
    position: absolute;
    bottom: 12px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 10;
  }

  .btn {
    background: rgba(0,0,0,0.7);
    color: #00ffcc;
    border: 1px solid #00ffcc44;
    border-radius: 6px;
    padding: 8px 16px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s;
  }
  .btn:active { background: rgba(0,255,204,0.15); }

  #status {
    text-align: center;
    font-size: 12px;
    color: #00ffcc88;
    padding: 8px;
    letter-spacing: 0.1em;
  }

  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 40px 20px;
  }

  .title {
    font-size: 22px;
    letter-spacing: 0.2em;
    color: #00ffcc;
    text-shadow: 0 0 20px #00ffcc66;
  }

  .subtitle {
    font-size: 12px;
    color: #00ffcc55;
    letter-spacing: 0.15em;
  }

  .start-btn {
    background: transparent;
    color: #00ffcc;
    border: 1px solid #00ffcc;
    border-radius: 8px;
    padding: 14px 32px;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  .start-btn:active { background: rgba(0,255,204,0.1); }
</style>
</head>
<body>

<div id="start-screen">
  <div class="title">LAUGHING MAN</div>
  <div class="subtitle">SECTION 9 // FACE OVERLAY SYSTEM</div>
  <button class="start-btn" onclick="startCamera()">カメラを起動</button>
  <div id="status">カメラの許可が必要です</div>
</div>

<div id="container" style="display:none">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <button class="btn" onclick="toggleOverlay()">オーバーレイ ON/OFF</button>
    <button class="btn" onclick="switchCamera()">カメラ切替</button>
  </div>
</div>

<script type="module">
import { FaceDetector, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let faceDetector = null;
let overlayEnabled = true;
let angle = 0;
let currentFacingMode = 'user';
let stream = null;
let animFrameId = null;

// ── Laughing Man ロゴ（SAC原作風）──
function drawLaughingMan(cx, cy, r) {
  ctx.save();
  ctx.translate(cx, cy);

  const C = '#00e5cc';
  const W = '#ffffff';
  const BG = '#002a22';

  // 背景円
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = BG;
  ctx.fill();

  // 二重リング
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.89, 0, Math.PI * 2);
  ctx.strokeStyle = C;
  ctx.lineWidth = r * 0.028;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.78, 0, Math.PI * 2);
  ctx.strokeStyle = C;
  ctx.lineWidth = r * 0.013;
  ctx.stroke();

  // 横顔シルエット
  const s = r * 0.52;
  ctx.fillStyle = C;
  ctx.beginPath();
  ctx.moveTo(s * 0.05, -s * 0.88);
  ctx.bezierCurveTo(s * 0.3, -s * 0.92, s * 0.65, -s * 0.65, s * 0.62, -s * 0.1);
  ctx.bezierCurveTo(s * 0.58, s * 0.2, s * 0.38, s * 0.38, s * 0.1, s * 0.44);
  ctx.lineTo(-s * 0.12, s * 0.44);
  ctx.lineTo(-s * 0.12, s * 0.24);
  ctx.bezierCurveTo(-s * 0.28, s * 0.18, -s * 0.45, s * 0.02, -s * 0.48, -s * 0.12);
  ctx.bezierCurveTo(-s * 0.52, -s * 0.22, -s * 0.42, -s * 0.32, -s * 0.32, -s * 0.28);
  ctx.bezierCurveTo(-s * 0.25, -s * 0.52, -s * 0.15, -s * 0.78, s * 0.05, -s * 0.88);
  ctx.closePath();
  ctx.fill();

  // 帽子本体
  ctx.beginPath();
  ctx.moveTo(-s * 0.32, -s * 0.82);
  ctx.bezierCurveTo(-s * 0.28, -s * 1.12, s * 0.22, -s * 1.15, s * 0.28, -s * 0.9);
  ctx.lineTo(s * 0.05, -s * 0.88);
  ctx.bezierCurveTo(-s * 0.02, -s * 0.78, -s * 0.18, -s * 0.76, -s * 0.32, -s * 0.82);
  ctx.closePath();
  ctx.fill();

  // つば
  ctx.beginPath();
  ctx.moveTo(s * 0.28, -s * 0.9);
  ctx.bezierCurveTo(s * 0.55, -s * 0.88, s * 0.68, -s * 0.78, s * 0.58, -s * 0.72);
  ctx.bezierCurveTo(s * 0.48, -s * 0.66, s * 0.22, -s * 0.7, s * 0.1, -s * 0.76);
  ctx.closePath();
  ctx.fill();

  // 目（背景色でくり抜き）
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.ellipse(-s * 0.2, -s * 0.38, s * 0.075, s * 0.05, 0.15, 0, Math.PI * 2);
  ctx.fill();

  // 回転テキストリング
  ctx.rotate(angle);
  const text = "I thought what I'd do was, I'd pretend I was one of those deaf-mutes. ";
  const chars = text.split('');
  const ringR = r * 0.835;
  const fontSize = Math.max(8, r * 0.1);
  ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
  ctx.fillStyle = W;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  chars.forEach((char, i) => {
    const a = (i / chars.length) * Math.PI * 2 - Math.PI / 2;
    ctx.save();
    ctx.rotate(a);
    ctx.translate(0, -ringR);
    ctx.rotate(Math.PI / 2);
    ctx.fillText(char, 0, 0);
    ctx.restore();
  });

  ctx.restore();
}

// ── MediaPipe 初期化 ──
async function initDetector() {
  status.textContent = 'AI モデルを読み込み中…';
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );
  faceDetector = await FaceDetector.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    minDetectionConfidence: 0.5,
  });
  status.textContent = '準備完了';
}

// ── カメラ起動 ──
window.startCamera = async function() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('container').style.display = 'block';

  await openCamera(currentFacingMode);
  await initDetector();
  requestAnimationFrame(loop);
};

async function openCamera(facingMode) {
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  } catch(e) {
    status.textContent = 'カメラの許可が必要です';
  }
}

// ── メインループ ──
let lastVideoTime = -1;

// グリッチエフェクト管理
// appearProgress: 0=未検出, 0〜1=出現中, 1=完全表示
const faceStates = new Map(); // faceId → { progress, lastSeen }
let frameCount = 0;

function drawGlitchEffect(cx, cy, r, progress) {
  ctx.save();
  ctx.translate(cx, cy);

  const C = '#00e5cc';

  if (progress < 0.3) {
    // フェーズ1: バラバラなノイズブロック＋円のちらつき
    const blocks = Math.floor(25 * progress / 0.3);
    for (let i = 0; i < blocks; i++) {
      const bx = (Math.random() - 0.5) * r * 2;
      const by = (Math.random() - 0.5) * r * 2;
      const bw = Math.random() * r * 0.5 + r * 0.05;
      const bh = Math.random() * r * 0.1 + r * 0.02;
      ctx.fillStyle = `rgba(0,229,204,${Math.random() * 0.9})`;
      ctx.fillRect(bx, by, bw, bh);
    }
    if (Math.random() > 0.3) {
      ctx.beginPath();
      ctx.arc(0, 0, r * (0.6 + Math.random() * 0.4), 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,229,204,${Math.random() * 0.7})`;
      ctx.lineWidth = r * 0.035;
      ctx.stroke();
    }
  } else if (progress < 0.65) {
    // フェーズ2: ズレたロゴ断片＋水平ノイズライン
    const t = (progress - 0.3) / 0.35;

    // ズレたロゴを2枚
    const offsets = [
      { dx: (Math.random() - 0.5) * r * 0.18, dy: (Math.random()-0.5)*r*0.08, a: 0.35 * t },
      { dx: (Math.random() - 0.5) * r * 0.12, dy: (Math.random()-0.5)*r*0.12, a: 0.25 * t },
    ];
    offsets.forEach(o => {
      ctx.save();
      ctx.translate(o.dx, o.dy);
      ctx.globalAlpha = o.a;
      drawLaughingMan(0, 0, r);
      ctx.restore();
    });

    // 水平ノイズライン
    for (let i = 0; i < 8; i++) {
      const ly = (Math.random() - 0.5) * r * 2;
      const lw = Math.random() * r * 1.8;
      ctx.fillStyle = `rgba(0,229,204,${Math.random() * 0.6})`;
      ctx.fillRect(-lw / 2, ly, lw, r * 0.035);
    }
  } else {
    // フェーズ3: 揺れながら固まる
    const t = (progress - 0.65) / 0.35;
    const jitter = (1 - t) * r * 0.06;
    ctx.translate((Math.random() - 0.5) * jitter, (Math.random() - 0.5) * jitter);
    ctx.globalAlpha = 0.4 + t * 0.6;
    drawLaughingMan(0, 0, r);
  }

  ctx.restore();
}

async function loop() {
  animFrameId = requestAnimationFrame(loop);
  frameCount++;

  if (video.readyState < 2) return;

  // 映像をcanvasに描画
  ctx.save();
  if (currentFacingMode === 'user') {
    ctx.scale(-1, 1);
    ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  } else {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  }
  ctx.restore();

  // 顔検出
  if (faceDetector && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    try {
      const result = faceDetector.detectForVideo(video, performance.now());
      if (overlayEnabled && result.detections.length > 0) {
        result.detections.forEach((det, i) => {
          const bb = det.boundingBox;
          let x = currentFacingMode === 'user'
            ? canvas.width - bb.originX - bb.width
            : bb.originX;
          const y = bb.originY;
          const w = bb.width;
          const h = bb.height;
          const cx = x + w / 2;
          const cy = y + h / 2;
          const r = Math.max(w, h) * 0.65;

          // グリッチ進捗管理
          const key = i;
          if (!faceStates.has(key)) {
            faceStates.set(key, { progress: 0 });
          }
          const state = faceStates.get(key);
          state.lastFrame = frameCount;

          if (state.progress >= 1) {
            // 完全表示
            drawLaughingMan(cx, cy, r);
          } else {
            // 出現エフェクト
            state.progress = Math.min(1, state.progress + 0.015);
            if (state.progress >= 1) {
              drawLaughingMan(cx, cy, r);
            } else {
              drawGlitchEffect(cx, cy, r, state.progress);
            }
          }
        });
      } else {
        // 顔が消えたらリセット
        faceStates.forEach((state, key) => {
          if (frameCount - (state.lastFrame || 0) > 5) {
            faceStates.delete(key);
          }
        });
      }
    } catch(e) {}
  }

  angle += 0.008;
}

// ── ボタン ──
window.toggleOverlay = function() {
  overlayEnabled = !overlayEnabled;
};

window.switchCamera = async function() {
  currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
  await openCamera(currentFacingMode);
};
</script>
</body>
</html>
